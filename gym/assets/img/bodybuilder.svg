<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <!-- Transparent background -->
  <rect width="400" height="600" fill="none"/>
  
  <!-- Head -->
  <circle cx="200" cy="80" r="45" fill="#d4a574"/>
  
  <!-- Neck -->
  <rect x="185" y="120" width="30" height="25" fill="#d4a574"/>
  
  <!-- Shoulders and chest (muscular) -->
  <ellipse cx="200" cy="160" rx="80" ry="55" fill="#c9915d"/>
  <path d="M 120 160 Q 100 140 90 160 Q 95 180 120 185 Z" fill="#b8824a"/>
  <path d="M 280 160 Q 300 140 310 160 Q 305 180 280 185 Z" fill="#b8824a"/>
  
  <!-- Pectoral muscles definition -->
  <path d="M 160 150 Q 160 180 170 200" stroke="#a87040" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 240 150 Q 240 180 230 200" stroke="#a87040" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Abdominal muscles -->
  <rect x="180" y="200" width="40" height="15" rx="5" fill="#c9915d"/>
  <line x1="175" y1="215" x2="225" y2="215" stroke="#a87040" stroke-width="2"/>
  <rect x="180" y="220" width="40" height="15" rx="5" fill="#c9915d"/>
  <line x1="175" y1="235" x2="225" y2="235" stroke="#a87040" stroke-width="2"/>
  <rect x="180" y="240" width="40" height="15" rx="5" fill="#c9915d"/>
  
  <!-- Left arm (flexed bicep) -->
  <path d="M 120 165 Q 90 140 75 120 Q 70 110 75 105 Q 95 100 110 120 Q 125 145 130 175" fill="#d4a574"/>
  <!-- Left bicep muscle -->
  <ellipse cx="95" cy="130" rx="18" ry="28" fill="#c9915d"/>
  <path d="M 85 120 Q 95 110 105 125" stroke="#a87040" stroke-width="2" fill="none"/>
  
  <!-- Right arm (flexed bicep) -->
  <path d="M 280 165 Q 310 140 325 120 Q 330 110 325 105 Q 305 100 290 120 Q 275 145 270 175" fill="#d4a574"/>
  <!-- Right bicep muscle -->
  <ellipse cx="305" cy="130" rx="18" ry="28" fill="#c9915d"/>
  <path d="M 315 120 Q 305 110 295 125" stroke="#a87040" stroke-width="2" fill="none"/>
  
  <!-- Forearms -->
  <path d="M 75 105 L 55 80 L 60 75 L 80 95" fill="#d4a574"/>
  <path d="M 325 105 L 345 80 L 340 75 L 320 95" fill="#d4a574"/>
  
  <!-- Hands holding dumbbell -->
  <circle cx="50" cy="70" r="8" fill="#d4a574"/>
  <circle cx="350" cy="70" r="8" fill="#d4a574"/>
  
  <!-- Dumbbell bar -->
  <rect x="58" y="68" width="284" height="4" rx="2" fill="#8b7355"/>
  <!-- Dumbbell weight plates -->
  <circle cx="50" cy="70" r="12" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="350" cy="70" r="12" fill="none" stroke="#333" stroke-width="2"/>
  
  <!-- Waist -->
  <ellipse cx="200" cy="265" rx="35" ry="25" fill="#c9915d"/>
  
  <!-- Left leg -->
  <path d="M 180 290 L 170 420 L 175 420 L 185 290" fill="#d4a574"/>
  <!-- Left quadriceps definition -->
  <path d="M 175 310 Q 170 350 168 420" stroke="#a87040" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 180 310 Q 180 360 180 420" stroke="#a87040" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Right leg -->
  <path d="M 220 290 L 230 420 L 225 420 L 215 290" fill="#d4a574"/>
  <!-- Right quadriceps definition -->
  <path d="M 225 310 Q 230 350 232 420" stroke="#a87040" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 220 310 Q 220 360 220 420" stroke="#a87040" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Shoes -->
  <ellipse cx="170" cy="435" rx="12" ry="8" fill="#333"/>
  <ellipse cx="230" cy="435" rx="12" ry="8" fill="#333"/>
  
  <!-- Facial features -->
  <circle cx="190" cy="70" r="4" fill="#333"/>
  <circle cx="210" cy="70" r="4" fill="#333"/>
  <path d="M 195 85 Q 200 90 205 85" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>